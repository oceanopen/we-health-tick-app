# 构建工作流：在 macOS 和 Windows 上构建 Tauri 应用并上传产物
name: Release Assets

on:
  push:
    tags:
      - 'v*' # 匹配 v 开头的 tag（如 v0.1.0），推送 tag 时自动触发
  workflow_dispatch: # 支持在 GitHub Actions 页面手动触发

jobs:
  build:
    strategy:
      matrix:
        include:
          # macOS 构建：生成通用二进制（同时支持 Intel 和 Apple Silicon）
          - platform: macos-latest
            args: --target universal-apple-darwin
          # Windows 构建：默认 target，无需额外参数
          - platform: windows-latest
            args: ''

    runs-on: ${{ matrix.platform }}
    steps:
      # 拉取代码，fetch-depth: 0 获取完整历史（Tauri 构建需要 git 历史来确定版本号）
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      # 安装 pnpm 包管理器（项目使用 pnpm 管理依赖）
      # 必须在 setup-node 之前：setup-node 的 cache: pnpm 需要调用 pnpm 读取 lockfile 来设置缓存 key
      - uses: pnpm/action-setup@v6

      # 安装 Node.js（前端构建需要）
      - uses: actions/setup-node@v6
        with:
          node-version: 24

      # 安装 Rust 工具链（Tauri 后端使用 Rust 编写）
      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: stable

      # 添加 macOS 多架构编译目标（x86_64 = Intel, aarch64 = Apple Silicon）
      - name: Install macOS targets
        if: matrix.platform == 'macos-latest'
        run: rustup target add x86_64-apple-darwin aarch64-apple-darwin

      # 安装前端及 Tauri 依赖
      - name: Install app dependencies
        run: pnpm install

      # tag 推送：构建 + 发布一体化。
      # tauri-action 在检测到 updater 配置后会自动：
      #   1. 用 TAURI_SIGNING_PRIVATE_KEY 给 .app.tar.gz / nsis .tar.gz 签名，生成 .sig 文件
      #   2. 生成 latest.json manifest（含版本、下载 URL、签名）
      #   3. 上传所有产物（dmg / exe / *.tar.gz / *.sig / latest.json）到 GitHub Release
      # updaterJsonPreferNsis: 与 bundle.targets=["nsis"] 对齐，Windows 产物用 nsis 包而非 zip
      # 注：用 tauri-action 内置 release 替代了原先的 softprops/action-gh-release，
      #     因为 latest.json 必须由 tauri-action 在 release 阶段生成（手动上传会漏）。
      - name: Build and release
        if: github.ref_type == 'tag'
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
        with:
          tauriScript: pnpm tauri
          args: ${{ matrix.args }}
          updaterJsonPreferNsis: true
          tagName: ${{ github.ref_name }}
          releaseName: 'We Health Tick ${{ github.ref_name }}'
          releaseDraft: false
          prerelease: false
