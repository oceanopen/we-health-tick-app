# 构建工作流：在 macOS 和 Windows 上构建 Tauri 应用并上传产物
name: Release Assets

on:
  push:
    tags:
      - 'v*' # 匹配 v 开头的 tag（如 v0.1.0），推送 tag 时自动触发

jobs:
  build:
    strategy:
      matrix:
        include:
          # macOS 构建：Apple Silicon（M 芯片）
          - platform: macos-latest
            args: --target aarch64-apple-darwin
          # macOS 构建：Intel（x86_64）
          - platform: macos-latest
            args: --target x86_64-apple-darwin
          # Windows 构建：默认 target，无需额外参数
          - platform: windows-latest
            args: ''

    runs-on: ${{ matrix.platform }}
    steps:
      # 拉取代码，fetch-depth: 0 获取完整历史（Tauri 构建需要 git 历史来确定版本号）
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      # 安装 pnpm 包管理器（项目使用 pnpm 管理依赖）
      # 必须在 setup-node 之前：setup-node 的 cache: pnpm 需要调用 pnpm 读取 lockfile 来设置缓存 key
      - uses: pnpm/action-setup@v6

      # 安装 Node.js（前端构建需要）
      - uses: actions/setup-node@v6
        with:
          node-version: 24

      # 安装 Rust 工具链（Tauri 后端使用 Rust 编写）
      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: stable

      # 添加 macOS 编译目标（按矩阵只安装当前架构对应的单个 target）
      - name: Install macOS target
        if: matrix.platform == 'macos-latest'
        run: rustup target add ${{ matrix.args == '--target aarch64-apple-darwin' && 'aarch64-apple-darwin' || 'x86_64-apple-darwin' }}

      # 安装前端及 Tauri 依赖
      - name: Install app dependencies
        run: pnpm install

      # tag 推送：构建 + 发布一体化。
      # tauri-action 在检测到 updater 配置后会自动：
      #   1. 用 TAURI_SIGNING_PRIVATE_KEY 给 .app.tar.gz / nsis .exe.sig 签名，生成 .sig 文件
      #   2. 生成 latest.json manifest（含版本、下载 URL、签名）
      #   3. 上传所有产物（dmg / exe / *.tar.gz / *.sig / latest.json）到 GitHub Release
      # bundle.targets=["app","dmg","nsis"]:
      #   - macOS: app 产 .app.tar.gz + .sig（updater 用），dmg 供首次安装
      #     注意 updater 只认 app target，dmg 不会产 updater 产物
      #   - Windows: nsis 产 .exe + .exe.sig（updater 用）
      # updaterJsonPreferNsis: 与 Windows nsis-only 对齐，latest.json 里 Windows 走 nsis 路径而非 msi
      # 注：用 tauri-action 内置 release 替代了原先的 softprops/action-gh-release，
      #     因为 latest.json 必须由 tauri-action 在 release 阶段生成（手动上传会漏）。
      - name: Build and release
        if: github.ref_type == 'tag'
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
        with:
          tauriScript: pnpm tauri:build
          args: ${{ matrix.args }}
          updaterJsonPreferNsis: true
          tagName: ${{ github.ref_name }}
          releaseName: 'We Health Tick ${{ github.ref_name }}'
          releaseDraft: false
          prerelease: false

  # ============================================================
  # Gitee 同步：矩阵构建全部完成后执行（best-effort，绝不阻塞 GitHub 主流程）
  # 实现已抽离为可复用 workflow（.github/workflows/release-gitee-sync.yml），此处仅声明依赖与调用。
  # github.ref_name / github.sha / 所有 secrets 通过调用上下文自动继承（secrets: inherit），
  # 故被调用 workflow 无需 inputs，何时运行由此处的 needs / if 决定。
  # ============================================================
  sync-gitee:
    needs: build
    # 仅当 mac+windows 矩阵全部成功才同步（构建失败则无资产可同步）
    if: ${{ !cancelled() && needs.build.result == 'success' }}
    uses: ./.github/workflows/release-gitee-sync.yml
    secrets: inherit
