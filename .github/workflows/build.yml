# 构建工作流：在 macOS 和 Windows 上构建 Tauri 应用并上传产物
name: Build

on:
  push:
    tags:
      - 'v*' # 匹配 v 开头的 tag（如 v0.1.0），推送 tag 时自动触发
  workflow_dispatch: # 支持在 GitHub Actions 页面手动触发

jobs:
  build:
    strategy:
      matrix:
        include:
          # macOS 构建：生成通用二进制（同时支持 Intel 和 Apple Silicon）
          - platform: macos-latest
            args: --target universal-apple-darwin
          # Windows 构建：默认 target，无需额外参数
          - platform: windows-latest
            args: ''

    runs-on: ${{ matrix.platform }}
    steps:
      # 拉取代码，fetch-depth: 0 获取完整历史（Tauri 构建需要 git 历史来确定版本号）
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      # 安装 pnpm 包管理器（项目使用 pnpm 管理依赖）
      # 必须在 setup-node 之前：setup-node 的 cache: pnpm 需要调用 pnpm 读取 lockfile 来设置缓存 key
      - uses: pnpm/action-setup@v6
        # with:
        #   version: 10
        # 移除 version 参数：pnpm/action-setup@v6 会自动从 package.json 的 packageManager 字段读取版本号，
        # 同时指定两处会导致 "Multiple versions of pnpm specified" 错误

      # 安装 Node.js（前端构建需要）
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      # 安装 Rust 工具链（Tauri 后端使用 Rust 编写）
      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@v1
        with:
          # toolchain: 1.96.0
          toolchain: stable

      # 缓存 Rust 编译产物，避免每次全量重新编译依赖
      # workspaces 格式为 "workspace路径 -> target目录名"，
      # 表示 Rust 代码在 src-tauri/ 目录下，编译产物在 src-tauri/target/
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      # 添加 macOS 多架构编译目标（x86_64 = Intel, aarch64 = Apple Silicon）
      - name: Install macOS targets
        if: matrix.platform == 'macos-latest'
        run: rustup target add x86_64-apple-darwin aarch64-apple-darwin

      # 安装前端及 Tauri 依赖
      - name: Install app dependencies
        run: pnpm install

      # 执行 Tauri 构建，实际执行 pnpm tauri build（action 内部会自动拼接 build 子命令）
      - name: Build
        uses: tauri-apps/tauri-action@v0
        env:
          # GitHub 自动提供的 token，无需额外配置，用于 tauri-action 访问仓库 API
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tauriScript: pnpm tauri # 指定 Tauri CLI 入口命令
          args: ${{ matrix.args }} # 传递构建参数（如 macOS 的 --target universal-apple-darwin）

      # 重命名 macOS 产物为统一格式：WeHealthTick-{版本号}-macos-universal.dmg
      - name: Rename macOS artifacts
        if: matrix.platform == 'macos-latest'
        run: |
          cd src-tauri/target/universal-apple-darwin/release/bundle/dmg
          for f in *.dmg; do
            version=$(echo "$f" | grep -oE '[0-9]+\.[0-9]+\.[0-9]+')
            new_name="WeHealthTick-${version}-macos-universal.dmg"
            mv "$f" "$new_name"
            echo "Renamed: $f -> $new_name"
          done

      # 重命名 Windows 产物为统一格式：WeHealthTick-{版本号}-windows-x64-setup.exe
      - name: Rename Windows artifacts
        if: matrix.platform == 'windows-latest'
        shell: pwsh
        run: |
          cd src-tauri/target/release/bundle/nsis
          Get-ChildItem *.exe | ForEach-Object {
            $version = if ($_.Name -match '(\d+\.\d+\.\d+)') { $matches[1] } else { '0.0.0' }
            $newName = "WeHealthTick-${version}-windows-x64-setup.exe"
            Rename-Item $_.Name $newName
            Write-Host "Renamed: $($_.Name) -> $newName"
          }

      # 将构建产物上传到 GitHub Release 页面
      - name: Upload to GitHub Release
        if: github.ref_type == 'tag'
        uses: softprops/action-gh-release@v3
        with:
          files: |
            src-tauri/target/universal-apple-darwin/release/bundle/dmg/*.dmg
            src-tauri/target/release/bundle/nsis/*.exe
