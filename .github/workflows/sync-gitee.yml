# Gitee 同步（可复用 workflow）：把 GitHub Release 的产物同步到 Gitee 镜像仓库。
# 由 .github/workflows/release-assets.yml 在 build 矩阵完成后经 needs: build + uses: 调用，
# 因此本文件 job 不需要自己的 needs / if —— 何时运行由调用方决定。
# github.ref_name（tag）/ github.sha（commit）/ 所有 secrets 通过调用上下文自动继承（secrets: inherit）。
#
# 同步内容：commit+tag 镜像、构建资产上传到 Gitee Release、Gitee 专属 latest.json
# 设计要点：
#   - secrets 缺失（如 fork 仓库）自动跳过整 job
#   - 镜像 / 资产上传单点失败 / orphan 分支推送失败均不阻塞其余步骤
#   - Gitee v5 鉴权坑：access_token 一律放 body / form field，绝不放 header
#   - manifest 双推 GitHub + Gitee：Gitee 端即时可用（不等下次镜像）；
#     GitHub 端留存便于审计，且对镜像 ref 处理策略保持稳健
name: Sync to Gitee

on:
  workflow_call:

jobs:
  sync-gitee:
    name: Sync to Gitee (mirror + release + manifest)
    runs-on: ubuntu-latest
    permissions:
      contents: write # 推送 release-manifest orphan 分支到 GitHub 需要
    env:
      # 注意 owner 拼写差异：GitHub=oceanopen（无连字符），Gitee=ocean-open（有连字符）
      GITEE_OWNER: ocean-open
      GITEE_REPO: we-health-tick-app
      GH_REPO: oceanopen/we-health-tick-app
      TAG: ${{ github.ref_name }}
    steps:
      # ---------- 前置：secrets 齐全性门控 ----------
      - name: Gate on Gitee secrets
        id: gate
        env:
          GITEE_TOKEN: ${{ secrets.GITEE_TOKEN }}
          GITEE_USER: ${{ secrets.GITEE_USER }}
          GITEE_PRIVATE_KEY: ${{ secrets.GITEE_PRIVATE_KEY }}
        run: |
          if [ -z "$GITEE_TOKEN" ] || [ -z "$GITEE_USER" ] || [ -z "$GITEE_PRIVATE_KEY" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "::warning::Gitee secrets missing, skipping sync-gitee job"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      # ---------- 步骤 1：commit + tag 镜像（hub-mirror-action，force_update 强推含 tags） ----------
      - name: Mirror commits and tags to Gitee
        if: steps.gate.outputs.skip != 'true'
        continue-on-error: true # tag 可能已存在或 SSH 抽风，不阻塞后续资产上传
        uses: Yikun/hub-mirror-action@master
        with:
          src: 'github/${{ github.repository_owner }}'
          dst: 'gitee/${{ secrets.GITEE_USER }}'
          dst_key: ${{ secrets.GITEE_PRIVATE_KEY }}
          dst_token: ${{ secrets.GITEE_TOKEN }}
          static_list: ${{ github.event.repository.name }}
          force_update: true
          src_account_type: org
          dst_account_type: org
          clone_style: ssh

      # ---------- 步骤 2：下载 GitHub Release 全部资产 ----------
      - name: Download GitHub Release assets
        if: steps.gate.outputs.skip != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p ./assets
          gh release download "$TAG" --repo "$GH_REPO" --dir ./assets --clobber
          echo "Downloaded assets:"
          ls -la ./assets

      # ---------- 步骤 3：创建 / 复用 Gitee Release（access_token 必须放 body；best-effort） ----------
      - name: Create or get Gitee Release
        if: steps.gate.outputs.skip != 'true'
        id: gitee_release
        env:
          GITEE_TOKEN: ${{ secrets.GITEE_TOKEN }}
          # tag 实际指向的 commit（比硬编码 main 更严谨；Gitee Release 会指向该 commit）
          GITHUB_SHA: ${{ github.sha }}
        run: |
          python3 - <<'PYEOF'
          import json, os, urllib.request, urllib.error
          owner = os.environ["GITEE_OWNER"]
          repo  = os.environ["GITEE_REPO"]
          tag   = os.environ["TAG"]
          token = os.environ["GITEE_TOKEN"]
          sha   = os.environ.get("GITHUB_SHA", "main")
          base  = f"https://gitee.com/api/v5/repos/{owner}/{repo}"

          # best-effort：tag 可能尚未镜像到 Gitee / 网络抽风 / token 问题 → 优雅跳过，
          # 不写 release_id，下游步骤 4/5/6/7 凭 release_id / ok 守卫自动跳过。
          try:
              # 幂等：先查 tag 是否已有 release
              rid = ""
              try:
                  with urllib.request.urlopen(f"{base}/releases/tags/{tag}?access_token={token}") as r:
                      rid = str(json.load(r)["id"])
                      print(f"Existing Gitee release found: id={rid}")
              except urllib.error.HTTPError as e:
                  if e.code != 404:
                      raise

              if not rid:
                  # Gitee v5 鉴权坑：access_token 放 body，放 header 会返回 HTML 错误页
                  body = json.dumps({
                      "access_token": token,
                      "tag_name": tag,
                      "name": f"We Health Tick {tag}",
                      "body": f"Release {tag} (mirrored from GitHub)",
                      "target_commitish": sha,
                  }).encode()
                  req = urllib.request.Request(
                      f"{base}/releases",
                      data=body,
                      headers={"Content-Type": "application/json"},
                  )
                  rid = str(json.load(urllib.request.urlopen(req))["id"])
                  print(f"Created Gitee release: id={rid}")

              with open(os.environ["GITHUB_OUTPUT"], "a") as f:
                  f.write(f"release_id={rid}\n")
          except Exception as e:
              # 含 HTTPError / URLError（DNS / 超时 / 连接拒绝）/ JSON 解析等
              print(f"::warning::Gitee release creation skipped (downstream steps will skip): {e}")
          PYEOF

      # ---------- 步骤 4：上传资产到 Gitee Release（attach_files，multipart） ----------
      - name: Upload assets to Gitee Release
        if: steps.gate.outputs.skip != 'true' && steps.gitee_release.outputs.release_id
        env:
          GITEE_TOKEN: ${{ secrets.GITEE_TOKEN }}
          RELEASE_ID: ${{ steps.gitee_release.outputs.release_id }}
        run: |
          # 幂等：先取已有附件名集合，re-run 时跳过已存在同名文件
          # （Gitee attach_files 同名追加不覆盖，不去重会产生重复附件 + 污染步骤 5 的 url map）
          EXISTING=$(curl -fsSL \
            "https://gitee.com/api/v5/repos/${GITEE_OWNER}/${GITEE_REPO}/releases/${RELEASE_ID}?access_token=${GITEE_TOKEN}" \
            | python3 -c "import sys,json; d=json.load(sys.stdin); a=d.get('assets') or d.get('attach_files') or []; print('\n'.join(x.get('name','') for x in a))")
          UPLOAD_URL="https://gitee.com/api/v5/repos/${GITEE_OWNER}/${GITEE_REPO}/releases/${RELEASE_ID}/attach_files"
          shopt -s nullglob
          for f in ./assets/*; do
            base=$(basename "$f")
            # 跳过 GitHub 版 latest.json —— Gitee 专属 manifest 在步骤 6 单独生成
            [ "$base" = "latest.json" ] && continue
            if echo "$EXISTING" | grep -qxF "$base"; then
              echo "  Skip $base (already attached)"
              continue
            fi
            echo "  Uploading $base ..."
            # --retry 容忍偶发 5xx；单个失败仅 warn 不阻塞其余文件
            curl -fsSL --retry 3 --retry-delay 5 \
              -X POST "$UPLOAD_URL" \
              -F "access_token=${GITEE_TOKEN}" \
              -F "name=${base}" \
              -F "file=@${f}" \
              -o "/tmp/upload_resp.json" \
              -w "HTTP %{http_code}\n" || \
              echo "::warning::Failed to upload $base (continuing)"
          done

      # ---------- 步骤 5：查 Gitee Release 拿真实 browser_download_url（不猜格式；best-effort） ----------
      - name: Fetch Gitee Release asset URLs
        if: steps.gate.outputs.skip != 'true' && steps.gitee_release.outputs.release_id
        id: fetch_urls
        env:
          GITEE_TOKEN: ${{ secrets.GITEE_TOKEN }}
          RELEASE_ID: ${{ steps.gitee_release.outputs.release_id }}
        run: |
          python3 - <<'PYEOF'
          import json, os, urllib.request, urllib.error
          owner = os.environ["GITEE_OWNER"]
          repo  = os.environ["GITEE_REPO"]
          url = (
              f"https://gitee.com/api/v5/repos/{owner}/{repo}/releases/"
              f"{os.environ['RELEASE_ID']}?access_token={os.environ['GITEE_TOKEN']}"
          )
          try:
              rel = json.load(urllib.request.urlopen(url))
          except Exception as e:
              # 含 HTTPError / URLError（DNS / 超时 / 连接拒绝）—— 优雅跳过，下游步骤 6/7 凭 ok 守卫跳过
              print(f"::warning::Failed to fetch Gitee asset URLs (manifest rewrite will skip): {e}")
              with open(os.environ["GITHUB_OUTPUT"], "a") as f:
                  f.write("ok=false\n")
              raise SystemExit(0)
          # Gitee API 字段名可能是 assets 或 attach_files，两者都兜底
          assets = rel.get("assets") or rel.get("attach_files") or []
          mapping = {a["name"]: a["browser_download_url"] for a in assets}
          with open("/tmp/gitee_url_map.json", "w") as f:
              json.dump(mapping, f, indent=2)
          with open(os.environ["GITHUB_OUTPUT"], "a") as f:
              f.write("ok=true\n")
          print("Gitee asset URL map:")
          print(json.dumps(mapping, indent=2))
          PYEOF

      # ---------- 步骤 6：改写 latest.json → latest-gitee.json（下载 URL 指向 Gitee） ----------
      - name: Rewrite manifest to latest-gitee.json
        if: steps.gate.outputs.skip != 'true' && steps.fetch_urls.outputs.ok == 'true'
        run: |
          python3 - <<'PYEOF'
          import json
          with open("./assets/latest.json") as f:
              manifest = json.load(f)
          with open("/tmp/gitee_url_map.json") as f:
              gitee_urls = json.load(f)

          # 用 url 末尾文件名匹配 Gitee 资产
          # （universal 包同时命中 darwin-aarch64 / darwin-x86_64 两个 key）
          for target, info in manifest.get("platforms", {}).items():
              fname = info["url"].rsplit("/", 1)[-1]
              gitee_url = gitee_urls.get(fname)
              if not gitee_url:
                  # 容错：Gitee 可能对空格做编码，按去空格模糊匹配
                  for gname, gurl in gitee_urls.items():
                      if gname.replace(" ", "") == fname.replace(" ", ""):
                          gitee_url = gurl
                          break
              if not gitee_url:
                  raise SystemExit(f"::error::No Gitee URL for {target} -> {fname}")
              info["url"] = gitee_url
              print(f"  {target}: {fname}\n    -> {gitee_url}")

          # signature / version / notes / pub_date 等字段保持不变（同一把私钥签名，验签公钥一致）
          with open("./latest-gitee.json", "w") as f:
              json.dump(manifest, f, indent=2, ensure_ascii=False)
          print("Wrote ./latest-gitee.json")
          PYEOF

      # ---------- 步骤 7：双推 orphan 分支 release-manifest（GitHub + Gitee） ----------
      - name: Publish latest-gitee.json to release-manifest branch
        if: success() && steps.gate.outputs.skip != 'true' && steps.fetch_urls.outputs.ok == 'true'
        continue-on-error: true # manifest 托管失败不阻塞（资产已上传，可手动补）
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITEE_TOKEN: ${{ secrets.GITEE_TOKEN }}
          GITEE_USER: ${{ secrets.GITEE_USER }}
        run: |
          set -e
          WORKDIR="/tmp/release-manifest"
          rm -rf "$WORKDIR" && mkdir -p "$WORKDIR"
          cd "$WORKDIR"
          git init -q
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -q -b release-manifest
          cp "$GITHUB_WORKSPACE/latest-gitee.json" .
          git add latest-gitee.json
          git commit -q -m "chore(manifest): update latest-gitee.json for ${TAG}"

          # GitHub orphan 分支（留存 + 审计）
          git push -q --force "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" release-manifest
          echo "Pushed release-manifest to GitHub"

          # Gitee orphan 分支（即时可用，不等下次镜像）
          git push -q --force "https://${GITEE_USER}:${GITEE_TOKEN}@gitee.com/${GITEE_OWNER}/${GITEE_REPO}.git" release-manifest
          echo "Pushed release-manifest to Gitee"
          echo "::notice::Gitee manifest URL: https://gitee.com/${GITEE_OWNER}/${GITEE_REPO}/raw/release-manifest/latest-gitee.json"
