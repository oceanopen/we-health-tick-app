<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#34D399"/>
      <stop offset="100%" stop-color="#34D399"/>
    </linearGradient>
  </defs>

  <!-- Rounded square background -->
  <rect width="512" height="512" rx="108" fill="url(#bg)"/>

  <!-- Clock face -->
  <circle cx="256" cy="256" r="198" fill="none" stroke="white" stroke-width="50" opacity="0.9"/>

  <!-- Clock center dot -->
  <circle cx="256" cy="256" r="28" fill="white" opacity="0.9"/>

  <!-- Clock hour hand (pointing to ~10) -->
  <line x1="256" y1="256" x2="256" y2="129" stroke="white" stroke-width="40" stroke-linecap="round" opacity="0.9" transform="rotate(-60 256 256)"/>

  <!-- Clock minute hand (pointing to ~2) -->
  <line x1="256" y1="256" x2="256" y2="101" stroke="white" stroke-width="28" stroke-linecap="round" opacity="0.9" transform="rotate(60 256 256)"/>

  <!-- Lightning bolt (inside clock, bottom-right area) -->
  <g transform="translate(308, 300) scale(5.5)" opacity="0.95">
    <path d="M5.52.359A.5.5 0 0 1 6 0h4a.5.5 0 0 1 .474.658L8.694 6H12.5a.5.5 0 0 1 .395.807l-7 9a.5.5 0 0 1-.873-.454L6.823 9.5H3.5a.5.5 0 0 1-.48-.641l2.5-8.5z" fill="#FBBF24"/>
  </g>

  <!-- Tick marks on clock (12, 3, 6, 9 o'clock) -->
  <line x1="256" y1="69" x2="256" y2="86" stroke="white" stroke-width="22" stroke-linecap="round" opacity="0.9"/>
  <line x1="256" y1="426" x2="256" y2="443" stroke="white" stroke-width="22" stroke-linecap="round" opacity="0.9"/>
  <line x1="69" y1="256" x2="86" y2="256" stroke="white" stroke-width="22" stroke-linecap="round" opacity="0.9"/>
  <line x1="426" y1="256" x2="443" y2="256" stroke="white" stroke-width="22" stroke-linecap="round" opacity="0.9"/>
</svg>
