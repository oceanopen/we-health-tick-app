<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#34D399"/>
      <stop offset="100%" stop-color="#34D399"/>
    </linearGradient>
    <linearGradient id="lightning" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FCD34D"/>
      <stop offset="100%" stop-color="#F59E0B"/>
    </linearGradient>
  </defs>

  <!-- Rounded square background -->
  <rect width="512" height="512" rx="108" fill="url(#bg)"/>

  <!-- Clock face -->
  <circle cx="256" cy="256" r="198" fill="none" stroke="white" stroke-width="25" opacity="0.9"/>

  <!-- Clock center dot -->
  <circle cx="256" cy="256" r="14" fill="white" opacity="0.9"/>

  <!-- Clock hour hand (pointing to ~10) -->
  <line x1="256" y1="256" x2="256" y2="129" stroke="white" stroke-width="20" stroke-linecap="round" opacity="0.9" transform="rotate(-60 256 256)"/>

  <!-- Clock minute hand (pointing to ~2) -->
  <line x1="256" y1="256" x2="256" y2="101" stroke="white" stroke-width="14" stroke-linecap="round" opacity="0.9" transform="rotate(60 256 256)"/>

  <!-- Lightning bolt (overlapping clock, positioned to the right) -->
  <polygon
    points="397,100 341,270 397,270 313,440 454,228 397,228 454,100"
    fill="url(#lightning)"
    opacity="0.95"
  />

  <!-- Tick marks on clock (12, 3, 6, 9 o'clock) -->
  <line x1="256" y1="69" x2="256" y2="86" stroke="white" stroke-width="11" stroke-linecap="round" opacity="0.7"/>
  <line x1="256" y1="426" x2="256" y2="443" stroke="white" stroke-width="11" stroke-linecap="round" opacity="0.7"/>
  <line x1="69" y1="256" x2="86" y2="256" stroke="white" stroke-width="11" stroke-linecap="round" opacity="0.7"/>
  <line x1="426" y1="256" x2="443" y2="256" stroke="white" stroke-width="11" stroke-linecap="round" opacity="0.7"/>
</svg>
